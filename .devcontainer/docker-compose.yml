services:
  php:
    container_name: app-uoou-php
    build:
      context: .
      dockerfile: Dockerfile

    volumes:
      - ../..:/workspaces:cached
      - ./php/xdebug.ini:/usr/local/etc/php/conf.d/xdebug.ini

    working_dir: /workspaces/uoou-solutions
    depends_on:
      database:
        condition: service_healthy
    command: php -S 0.0.0.0:8000 -t public

  nginx:
    container_name: app-uoou-nginx
    image: nginx:latest
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - php
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

networks:
  default:
    name: uoou-solutions-network
