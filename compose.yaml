
services:
###> doctrine/doctrine-bundle ###
  database:
    image: postgres:${POSTGRES_VERSION:-16}-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      # You should definitely change the password in production
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-!ChangeMe!}
      POSTGRES_USER: ${POSTGRES_USER:-app}
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "${POSTGRES_DB:-app}", "-U", "${POSTGRES_USER:-app}"]
      timeout: 5s
      retries: 5
      start_period: 60s
    volumes:
      - database_data:/var/lib/postgresql/data:rw
      # You may use a bind-mounted host directory instead, so that it is harder to accidentally remove the volume and lose all your data!
      # - ./docker/db/data:/var/lib/postgresql/data:rw
###< doctrine/doctrine-bundle ###

###> uoou-app ###
  php:
    container_name: app-uoou-php
    build:
      context: .devcontainer
      dockerfile: Dockerfile
    volumes:
      - .:/workspaces/uoou-solutions:cached
      - .devcontainer/php/xdebug.ini:/usr/local/etc/php/conf.d/xdebug.ini
    working_dir: /workspaces/uoou-solutions
    depends_on:
      database:
        condition: service_healthy
    command: php -S 0.0.0.0:8000 -t public

  nginx:
    container_name: app-uoou-nginx
    image: nginx:latest
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - php
    volumes:
      - .devcontainer/nginx/default.conf:/etc/nginx/conf.d/default.conf
###< uoou-app ###

volumes:
###> doctrine/doctrine-bundle ###
  database_data:
###< doctrine/doctrine-bundle ###
